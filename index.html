<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <div class="main">
        <div class="image-div">
            <div class="logo-background">
                <img class="logo" src="images/odin-lined.png" alt="">
                <div class="logo-text">ODIN</div>
            </div>
        </div>
        <div class="right-div">
            <div class="text-div-container">
             <div class="text-content">This is not a real online service! You know you need 
                something<br/> like this in your life to help you realize your deepest dreams.<br/>
                 Sign up now to get started.<br/>
                 <br/>
                You know you want to.</div>>
            </div>
         <fieldset>   
          <div class="form-container">
            <h1>Let's do this</h1>  
            <form class="form" action="" method="post">
               <div class="firstname-input"> 
                <label for="first-name">FIRST NAME</label>
                <input type="text" id="first-name" name="first-name">
                </div> 
              <div class="lastname-input">
                <label for="">LAST NAME</label>
                <input type="text" id ="last-name">  
              </div>      
              <div class="email-input">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email">
              </div>
              <div class="phone-input">
                <label for="phone-number">PHONE NUMBER</label>
                <input type="number" id="phone-number" name="phone-number">
              </div>
               <div class="password-input">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" minlength="6" maxlength="20" required >
              </div>
                <div class="confirm-password-input">
                <label for="confirm-password"> CONFIRM PASSWORD</label>
                <input type="password" id="confirm-password" name="confirm-password" minlength="6" maxlength="20" required>
              </div>
              <div>
                <input type="submit" class="button" value="Create Account">
            </div>     
            </form>
          </div>
        </fieldset>          
            <div class="account-div">
                <div class="button-text">Already have an account? <a href="">log in</a></div>
            </div>
        </div>
    </div>
</body>
</html>
